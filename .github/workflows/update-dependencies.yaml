name: Update Dependencies

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # actions/checkout@v4.2.2
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        # actions/setup-node@v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Snapshot package.json before updates
        run: cp package.json /tmp/pkg_before.json

      - name: Update @adobe and @dropins packages
        id: update
        run: |
          npm update --save $(jq -r '.dependencies | keys[] | select(startswith("@adobe/") or startswith("@dropins/"))' package.json | tr '\n' ' ')
          if git diff --quiet package.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install and regenerate dropin assets
        if: steps.update.outputs.has_changes == 'true'
        run: npm install

      - name: Build PR body
        if: steps.update.outputs.has_changes == 'true'
        id: pr_body
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const before = JSON.parse(fs.readFileSync('/tmp/pkg_before.json', 'utf-8'));
          const after  = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
          const lines  = [];
          const scopes = ['@adobe/', '@dropins/'];
          for (const [name, ver] of Object.entries(after.dependencies || {})) {
            if (!scopes.some(s => name.startsWith(s))) continue;
            const prev = (before.dependencies || {})[name];
            if (prev && prev !== ver) {
              lines.push(`- \`${name}\`: \`${prev}\` → \`${ver}\``);
            }
          }
          const repo   = process.env.REPO_NAME;
          const owner  = process.env.OWNER;
          const branch = 'chore-dependency-updates';
          const packages = lines.join('\n') || '_(no tracked changes detected)_';
          const output = [
            packages,
            '',
            'Test URLs:',
            `- Before: https://main--${repo}--${owner}.aem.live/`,
            `- After: https://${branch}--${repo}--${owner}.aem.live/`,
          ].join('\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `body<<EOF\n${output}\nEOF\n`);
          EOF

      - name: Create Pull Request
        if: steps.update.outputs.has_changes == 'true'
        # peter-evans/create-pull-request@v7.0.8
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore-dependency-updates
          delete-branch: true
          commit-message: 'chore: update @adobe and @dropins dependencies'
          title: 'chore: weekly @adobe / @dropins dependency updates'
          body: |
            ## Weekly Dependency Updates

            This PR was automatically generated by the **Update Dependencies** workflow.

            ### Updated packages

            ${{ steps.pr_body.outputs.body }}
          labels: |
            dependencies
            automated
